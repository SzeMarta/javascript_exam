<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Photo Gallery</title>
	<link rel="stylesheet" href="css/gallery.css">
	<script src = "js/gallery.js"></script>
</head>

<body onload="init()">
	
	<div id = "image">
		Hover over an image below to display here.
	</div>
	
	<img class = "preview" alt = "An adult German Shepherd Dog on a green field" 
	src = "https://cdn.pixabay.com/photo/2019/03/23/05/15/schafer-dog-4074699_1280.jpg" 
	onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus="upDate(this)" onblur="unDo()">
	
	<img class = "preview" alt = "A brown Dachshund lying under a blanket" 
	src = "https://cdn.pixabay.com/photo/2020/05/16/20/30/dog-5179118_1280.jpg" 
	onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus="upDate(this)" onblur="unDo()">
	
	<img class = "preview" alt = "A Golden Retriever puppy lying on the grass" 
	src = "https://cdn.pixabay.com/photo/2019/12/03/22/22/dog-4671215_1280.jpg" 
	onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus="upDate(this)" onblur="unDo()">

	<img class = "preview" alt = "A photo of a dog paw and a human hand" 
	src = "https://cdn.pixabay.com/photo/2022/05/30/14/05/paw-7231300_1280.jpg" 
	onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus="upDate(this)" onblur="unDo()">

	<img class = "preview" alt = "A black dog sitting in front of a black background" 
	src = "https://cdn.pixabay.com/photo/2022/12/22/02/56/dog-7671355_1280.jpg" 
	onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus="upDate(this)" onblur="unDo()">

	<img class = "preview" alt = "A big white shepherd dog walking through a field" 
	src = "https://cdn.pixabay.com/photo/2023/09/22/17/59/dog-8269584_1280.jpg" 
	onmouseover = "upDate(this)" onmouseout = "unDo()" onfocus="upDate(this)" onblur="unDo()">

</body>
</html>
